name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    uses: sistem-analizi/ci/.github/workflows/deploy.yml@v1
    with:
      build_type: php
      year: '2026'
      php_version: '8.2'
      node_version: '20'

      build_command: |
        set -e

        # ─── 1) Production .env'i secret'tan yaz ─────────────────────────
        if [ -n "${LARAVEL_ENV:-}" ]; then
          printf '%s' "$LARAVEL_ENV" > .env
          echo ".env written from LARAVEL_ENV secret"
        else
          echo "::error::LARAVEL_ENV secret not set"
          exit 1
        fi

        # ─── 2) Composer install (vendor/ build runner'da oluşur) ────────
        composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

        # ─── 3) APP_KEY: .env'de yoksa üret ──────────────────────────────
        if ! grep -q '^APP_KEY=base64:' .env; then
          php artisan key:generate --force --no-interaction
        fi

        # ─── 4) Frontend asset build (Vite) ─────────────────────────────
        if [ -f package.json ]; then
          npm install --no-audit --no-fund
          npm run build
        fi

        # ─── 5) Vendor'ı tek zip dosyaya paketle (FTP transfer hızı için) ─
        # 10.000+ küçük dosya yerine ~30-50 MB tek zip uploadlamak FTP'de
        # 60+ dk yerine 1-2 dk sürer. Server-side deploy-hook unzip edip
        # zip'i silecek.
        echo "Zipping vendor/ ..."
        zip -qr vendor.zip vendor/
        ls -lh vendor.zip

        # ─── 6) vendor/ klasörünü local'den sil ─────────────────────────
        # Sadece vendor.zip deploy edilecek. Mirror diff-sync vendor/'ı
        # remote'ta görmediği için varsa onu da silmez (preserved by exclude).
        rm -rf vendor/

      # Runtime'da değişmesi gereken dosyalar — server'da preserve edilsin
      exclude: |
        vendor
        database/database.sqlite
        *.sqlite
        *.sqlite-journal
        storage/logs
        storage/framework/cache
        storage/framework/sessions
        storage/framework/views
        tests
        phpunit.xml
        .editorconfig

      clean_slate: false

      # LARAVEL_ENV: tüm .env içeriği (DEPLOY_HOOK_KEY de içinde olmalı)
      # DEPLOY_HOOK_KEY: deploy-hook auth için (LARAVEL_ENV'deki ile aynı değer)
      forward_secrets: LARAVEL_ENV, DEPLOY_HOOK_KEY

      # Deploy bitince hook URL'ini tetikle: vendor.zip'i extract et + artisan komutları
      post_deploy_hook_url: https://proje.kamilakgun.com.tr/2026/laboratuvar-otomasyonu/deploy-hook.php

    secrets: inherit
